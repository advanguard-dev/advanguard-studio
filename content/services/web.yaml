details:
  - title: Stratégie & architecture
    content: >-
      Arborescence, wireframes, définition des parcours clés. On pense la
      structure avant de designer.
  - title: Design UI
    content: >-
      Composants, design system, dark/light mode, animations. Chaque pixel a une
      raison d'être.
  - title: Développement
    content: >-
      Intégration sur la stack choisie. Code propre, accessible, performant
      (Core Web Vitals).
  - title: CMS & contenu
    content: >-
      Keystatic, Sanity, Contentful : vous éditez votre contenu sans toucher au
      code.
  - title: Lancement & SEO
    content: Deploy, configuration DNS, SEO on-page, GA4. Prêt à indexer dès le jour 1.
deliverables:
  - Design Figma complet
  - Site live + code source
  - CMS configuré
  - Documentation éditoriale
  - Formation à l'administration
